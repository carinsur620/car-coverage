<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - PrimeShield</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

header {
  background:#0074d9;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

button {
  padding:10px 15px;
  background:#ff4757;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover { background:#e84118; }
</style>
</head>

<body>

<header>
<h2>PrimeShield Dashboard</h2>
<button id="logoutBtn">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Welcome</h3>
<p id="userEmail">Loading...</p>
</div>

<div class="card">
<h3>Your Plan</h3>
<p>Active coverage plan: <strong>Pending</strong></p>
</div>

<div class="card">
<h3>Support</h3>
<p>Email: supportautoshield@gmail.com</p>
<p>Phone: 57169950</p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEnNIYafp1h4qRADKi_Kx3RvXMfzxwlP4",
  authDomain: "autoprotection-99453.firebaseapp.com",
  projectId: "autoprotection-99453",
  appId: "1:290645208750:web:e5015505c4697cc617073f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 Protect page
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText = "Logged in as: " + user.email;
  } else {
    alert("You must be logged in to access the dashboard.");
    window.location.href = "login.html";
  }
});

// 🔓 Logout
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});
</script>

</body>
</html>
